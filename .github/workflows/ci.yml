name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Go backend (build / vet / test / vuln)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Keep in sync with server/go.mod.
          go-version: "1.25.8"
          cache-dependency-path: server/go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Vulnerability scan (govulncheck)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...

  admin:
    name: Admin web (build / test / audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test:run

      - name: Dependency audit (blocking, high+)
        run: npm audit --omit=dev --audit-level=high

  client:
    name: Mobile app (typecheck / test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test -- --ci

      # Non-blocking: residual advisories are Expo build-tooling (not shipped in
      # the app bundle). Tracked in docs/SECURITY_CLOSURE.md; clears on SDK bump.
      - name: Dependency audit (report-only)
        run: npm audit --omit=dev || true

  worker:
    name: Python worker (compile / lint / audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: pip install ruff pip-audit

      - name: Compile check
        run: python -m py_compile main.py

      - name: Lint (ruff)
        run: ruff check .

      - name: Dependency audit (pip-audit)
        run: pip-audit -r requirements.txt
