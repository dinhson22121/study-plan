# ============================================================================
# SCAFFOLD — production deploy pipeline for the Edu App backend.
# ----------------------------------------------------------------------------
# This is a clearly-labeled starting point, NOT a turnkey pipeline. Before you
# enable it you MUST:
#   - Create the GitHub Secrets referenced below (Settings > Secrets > Actions):
#       REGISTRY            e.g. ghcr.io  OR  <acct>.dkr.ecr.<region>.amazonaws.com
#       REGISTRY_USERNAME   registry login user (or use OIDC for ECR — preferred)
#       REGISTRY_PASSWORD   registry token/password
#       IMAGE_NAME          e.g. yourorg/edu-app
#       EC2_HOST            public DNS / IP of the EC2 host
#       EC2_USER            ssh user (e.g. ubuntu / ec2-user)
#       EC2_SSH_KEY         private key with access to EC2_HOST
#   - Decide your registry (GHCR / ECR / Docker Hub) and adjust the login step.
#   - Confirm the EC2 host has the repo checked out at REMOTE_REPO_DIR with a
#     populated .env (secrets sourced from SSM/Secrets Manager — see deploy/README.md).
# ============================================================================
name: Deploy (scaffold)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to build & deploy"
        required: false
        default: "latest"
  push:
    tags:
      - "v*"

env:
  # Remote path on EC2 where the repo (with .env) lives.
  REMOTE_REPO_DIR: /opt/edu-app

jobs:
  build-and-push:
    name: Build & push backend image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # PLACEHOLDER: registry login. Swap for ECR (aws-actions/amazon-ecr-login)
      # or docker/login-action for GHCR/Docker Hub as appropriate.
      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: |
            ${{ secrets.REGISTRY }}/${{ secrets.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ secrets.REGISTRY }}/${{ secrets.IMAGE_NAME }}:latest

  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE_TAG
          # PULL=1 so deploy.sh pulls the freshly-pushed image instead of
          # building on the box. .env on the host carries all EDU_* secrets.
          script: |
            set -eu
            cd ${{ env.REMOTE_REPO_DIR }}
            git fetch --all --tags
            git checkout ${{ needs.build-and-push.outputs.image_tag }} || git pull --ff-only
            export IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
            export PULL=1
            export SKIP_BUILD=1
            sh deploy/scripts/deploy.sh
