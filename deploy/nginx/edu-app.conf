# Edu App — Nginx reverse proxy + TLS for the Go/Gin API (app:8080).
#
# Mounted at /etc/nginx/conf.d/edu-app.conf by deploy/docker-compose.prod.yml.
# Certs are expected under /etc/nginx/certs/ (fullchain.pem + privkey.pem).
#
# Adjust `server_name` to your real domain before going live.

# ---- gzip (text assets / JSON API responses) ----
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_types
    application/json
    application/javascript
    application/xml
    text/css
    text/plain
    text/xml;

# Upstream API. Service name `app` resolves on the compose network.
upstream edu_api {
    server app:8080;
    keepalive 16;
}

# ---- HTTP :80 → redirect everything to HTTPS ----
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Allow ACME http-01 challenge if you renew Let's Encrypt on-box.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Serve health checks over plain HTTP too, so the container/LB healthcheck
    # (wget http://localhost/health) succeeds without following a TLS redirect.
    location = /health {
        proxy_pass http://edu_api;
        access_log off;
    }
    location = /health/ready {
        proxy_pass http://edu_api;
        access_log off;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS :443 — main entrypoint ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;  # TODO: set to your domain, e.g. api.example.com

    # TLS material (mount real certs into /etc/nginx/certs).
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Uploads: presigned flow + 20MB max file size (see config.go upload max).
    # Add headroom over 20MB for multipart overhead.
    client_max_body_size 25m;

    # ---- Security headers ----
    # HSTS: 1 year, include subdomains. Only enable `preload` once you are sure.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ---- Shared proxy settings ----
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header Connection        "";
    proxy_read_timeout    60s;
    proxy_connect_timeout 5s;

    # ---- Prometheus metrics: private access only ----
    # Restrict /metrics to an internal CIDR (VPC / monitoring subnet). Public
    # requests get 403. Adjust the allow block to your scrape source.
    location = /metrics {
        allow 10.0.0.0/8;       # VPC private range — adjust to your VPC CIDR
        allow 172.16.0.0/12;    # Docker / private range
        allow 127.0.0.1;        # on-box scrape
        deny all;

        proxy_pass http://edu_api;
    }

    # ---- Liveness / readiness (public; used by LB + smoke test) ----
    location = /health {
        proxy_pass http://edu_api;
        access_log off;
    }
    location = /health/ready {
        proxy_pass http://edu_api;
        access_log off;
    }

    # ---- Everything else → API ----
    location / {
        proxy_pass http://edu_api;
    }
}
